apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-metrics-agent-rolebinding

roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-metrics-agent-role

subjects:
  - kind: ServiceAccount
    name: prometheus-metrics-agent-sa
    namespace: observability