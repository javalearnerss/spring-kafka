
apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee-producer
  namespace: blue
  labels:
    app: employee-producer
    version: v1

spec:
  replicas: 2

  strategy: 
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: employee-producer
      version: v1

  template:
    metadata:
      labels:
        app: employee-producer
        version: v1

      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "7090"

    spec:

      terminationGracePeriodSeconds: 30

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000

      containers:
        - name: employee-producer-container
          image: employee-producer:v1
          imagePullPolicy: IfNotPresent

          envFrom:
            - configMapRef:
                name: employee-producer-config-map

          ports:
            - name: http
              containerPort: 7050

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits: 
              memory: "512Mi"
              cpu: "500m"

          readinessProbe:
            httpGet:
              path: "/actuator/health/readiness"
              port: 7090
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5

          livenessProbe:
            httpGet:
              path: "/actuator/health/liveness"
              port: 7090
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5

          startupProbe:
            httpGet:
              path: "/actuator/health"
              port: 7090
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5

      


